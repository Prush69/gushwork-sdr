<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gushwork — Talk to Our AI Sales Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #71717a;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Call Button */
        #call-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }

        #call-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.5);
        }

        #call-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #call-btn.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 60px rgba(239, 68, 68, 0.5); }
        }

        /* Status */
        #status {
            font-size: 0.85rem;
            color: #71717a;
            margin-bottom: 1.5rem;
            min-height: 1.2rem;
        }

        #status.connected { color: #22c55e; }
        #status.error { color: #ef4444; }

        /* Transcript */
        #transcript {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 1rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            display: none;
        }

        #transcript.visible { display: block; }

        .msg { margin-bottom: 0.5rem; }
        .msg-user { color: #818cf8; }
        .msg-agent { color: #a1a1aa; }
        .msg-label { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gushwork AEO</h1>
        <p class="subtitle">
            Talk to our AI Sales Agent. Get a free AEO visibility audit
            for your company — powered by Gemini 3 Flash.
        </p>

        <button id="call-btn" onclick="toggleCall()">
            🎤 Call
        </button>

        <div id="status">Click to connect</div>

        <div id="transcript"></div>
    </div>

    <!-- Retell Client SDK (loaded from CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@3/dist/index.umd.min.js"></script>

    <script>
        const btn = document.getElementById('call-btn');
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');

        let retellClient = null;
        let isCallActive = false;

        async function toggleCall() {
            if (isCallActive) {
                stopCall();
            } else {
                await startCall();
            }
        }

        async function startCall() {
            btn.disabled = true;
            statusEl.textContent = 'Connecting...';
            statusEl.className = '';

            try {
                // 1. Get access token from our backend
                const resp = await fetch('/create-web-call', { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Failed to create call');
                }
                const { access_token, call_id } = await resp.json();

                // 2. Initialize Retell client
                retellClient = new RetellWebClient();

                // 3. Set up event listeners
                retellClient.on('call_started', () => {
                    isCallActive = true;
                    btn.disabled = false;
                    btn.classList.add('active');
                    btn.innerHTML = '⏹ End';
                    statusEl.textContent = '🟢 Connected — speak now';
                    statusEl.className = 'connected';
                    transcriptEl.classList.add('visible');
                });

                retellClient.on('call_ended', () => {
                    resetUI();
                    statusEl.textContent = 'Call ended';
                });

                retellClient.on('agent_start_talking', () => {
                    statusEl.textContent = '🗣️ Agent speaking...';
                    statusEl.className = 'connected';
                });

                retellClient.on('agent_stop_talking', () => {
                    statusEl.textContent = '🎤 Listening...';
                    statusEl.className = 'connected';
                });

                retellClient.on('update', (update) => {
                    // Update transcript display
                    if (update.transcript) {
                        renderTranscript(update.transcript);
                    }
                });

                retellClient.on('error', (error) => {
                    console.error('Retell error:', error);
                    statusEl.textContent = `Error: ${error.message || 'Connection failed'}`;
                    statusEl.className = 'error';
                    resetUI();
                });

                // 4. Start the call
                await retellClient.startCall({
                    accessToken: access_token,
                });

            } catch (err) {
                console.error('Call setup error:', err);
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.className = 'error';
                btn.disabled = false;
            }
        }

        function stopCall() {
            if (retellClient) {
                retellClient.stopCall();
            }
            resetUI();
        }

        function resetUI() {
            isCallActive = false;
            btn.disabled = false;
            btn.classList.remove('active');
            btn.innerHTML = '🎤 Call';
        }

        function renderTranscript(transcript) {
            transcriptEl.innerHTML = transcript
                .map(entry => {
                    const isAgent = entry.role === 'agent';
                    const cls = isAgent ? 'msg-agent' : 'msg-user';
                    const label = isAgent ? 'Agent' : 'You';
                    return `<div class="msg ${cls}"><span class="msg-label">${label}:</span> ${entry.content}</div>`;
                })
                .join('');
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
    </script>
</body>
</html>
